<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Ra Vào </title>
    <style>
        h1
        {
            text-align: center;
        }
       
        :root {
            --bg-color: white;
            --text-color: black;
            --sidebar-bg: #f4f4f4;
            --table-bg: #ffffff;
            --table-border: #ddd;
            --button-bg: #0056b3;
            --button-text: white;
        }

       
        .filter-container {
            background: var(--sidebar-bg);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 0px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-container input, .filter-container button {
            padding: 8px;
            border-radius: 5px;
            border: none;
        }
        .filter-container button {
            background: var(--button-bg);
            color: var(--button-text);
            cursor: pointer;
        }
        .table-container {
            background: var(--table-bg);
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            min-width: 400px;
        }
        th, td {
            padding: 10px;
            border: 1px solid var(--table-border);
            text-align: left;
        }
        th {
            background: var(--table-border);
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                text-align: center;
            }
            .content {
                margin-left: 0;
                padding: 10px;
            }
            .filter-container {
                flex-direction: column;
                align-items: center;
            }
            table {
                min-width: 100%;
            }
        }
    </style>
     <!-- LINK CHÈN ICON -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- CSS -->
     <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
    <div class="wrap">
        <!-- menu -->
        <div class="menu">
            <div class="menu--main">
                <!-- menu list -->
                 <ul class="menu--list">
                    <li class="menu--item">
                        <i class="fa-brands fa-windows"style="color: white;"></i> 
                        <a href="#">Tổng Quan</a>
                    </li>
                    <li class="menu--item">
                        <i class="fa-brands fa-wpexplorer"style="color: white;"></i>
                        <a href="#">Lịch Sử Ra Vào</a>
                    </li>
                    <li class="menu--item">
                        <i class="fa-solid fa-users"style="color: white;"></i>
                        <a href="#">Quản Lý Người Dùng</a>
                    </li>
                
                    <li class="menu--item">
                        <i class="fa-solid fa-right-from-bracket"style="color: white;"></i>
                        <a href="#">Đăng Xuất</a>
                    </li>
                    <!-- collapse menu -->
                <div class="menu--collapse"style="color: white;">
                    <i class="fa-solid fa-left-long"style="color: white;"></i>
                    Collapse
                </div>
                 </ul>
            </div>
        </div>
        <!-- hết menu -->
    <div class="content">
        <h1>Lịch sử ra vào nhà</h1>
        <div class="filter-container">
            <label for="from-date">Từ ngày:</label>
            <input type="date" id="from-date">
            <label for="to-date">Đến ngày:</label>
            <input type="date" id="to-date">
            <button onclick="filterRecords()">Lọc</button>
        </div>
        <div class="table-container">
            <table>
                <tr>
                    <th>ID</th>
                    <th>Họ và tên</th>
                    <th>Phương thức ra vào</th>
                    <th>Thời Gian</th>
                </tr>
                <tr>
                    <td>001</td>
                    <td>Vũ Quốc</td>
                    <td>Vân tay</td>
                    <td>2025-03-17 08:00</td>
                </tr>
                <tr>
                    <td>002</td>
                    <td>Hồ Giang Trường</td>
                    <td>RFID</td>
                    <td>2025-03-16 17:30</td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
